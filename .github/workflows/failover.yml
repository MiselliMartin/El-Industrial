name: "Watchdog Failover"

on:
  schedule:
    - cron: '0 10,22 * * *' # Corre a las 10:00 AM y 10:00 PM UTC
  workflow_dispatch: # Permite correrlo manualmente para pruebas

jobs:
  check-and-failover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests xlsxwriter python-dotenv
          # Asumimos que bertual_api.py está en el repo o se puede descargar

      - name: Run Heartbeat Check and Failover
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Lógica para decidir si correr el reporte
          LAST_RUN=$(jq -r '.last_run' status/heartbeat.json)
          LAST_TS=$(date -d "$LAST_RUN" +%s)
          NOW_TS=$(date +%s)
          DIFF=$(( (NOW_TS - LAST_TS) / 3600 ))

          echo "Última corrida hace $DIFF horas."

          if [ $DIFF -ge 24 ]; then
            echo "🚨 Alerta: Nodos locales offline por más de 24h. Activando Failover..."
            # Corremos el script con el flag de reporte
            python3 scripts/update_products.py --report
            
            # Actualizamos el heartbeat para que el CI sepa que él mismo cumplió la tarea
            git config --global user.name "GitHub Action Watchdog"
            git config --global user.email "actions@github.com"
            git add status/ metrics.jsonl data/
            git commit -m "chore: failover recovery update [skip ci]"
            git push
          else
            echo "✅ Nodos locales funcionando correctamente. GitHub Watchdog en espera."
          fi
